spring:
  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: ${H2_DATASOURCE_URL:jdbc:h2:mem:testdb}
    driver-class-name: ${H2_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${H2_DATASOURCE_USERNAME:sa}
    password: ${H2_DATASOURCE_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        show_sql: true

server:
  port: 8080