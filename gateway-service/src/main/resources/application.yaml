server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      mvc:
        routes:
          - id: auth-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/auth/**,/api/users/**

          - id: board-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/posts/**,/api/comments/**