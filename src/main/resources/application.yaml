spring:
  application:
    name: ${APP_NAME:authboard}

  datasource:
    url: ${DB_URL:jdbc:h2:mem:authboard}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}

  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create}
    properties:
      hibernate:
        format_sql: true
        show_sql: true

server:
  port: ${SERVER_PORT:8080}